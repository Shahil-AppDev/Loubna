name: Deploy to Hetzner VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "vps-deployment"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build Next.js static site
        run: npm run build

      - name: Deploy to VPS via rsync
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            # Create temp directory
            mkdir -p /tmp/loubna-build-${{ github.sha }}

      - name: Transfer files via rsync
        run: |
          # Install rsync if needed
          sudo apt-get update && sudo apt-get install -y rsync

          # Create SSH key file
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Transfer files
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${{ secrets.VPS_PORT }}" \
            out/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/loubna-build-${{ github.sha }}/

          # Transfer deployment script
          rsync -avz -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${{ secrets.VPS_PORT }}" \
            scripts/deploy-server.sh \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/loubna-build-${{ github.sha }}/

          # Cleanup
          rm -f ~/.ssh/deploy_key

      - name: Execute deployment on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail

            echo "🚀 Starting deployment for juriste-droit-du-travail.com"

            # Variables
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            TEMP_DIR="/tmp/loubna-build-${{ github.sha }}"
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)

            # Create deploy directory if not exists
            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "📁 Creating deployment directory: $DEPLOY_PATH"
              sudo mkdir -p "$DEPLOY_PATH"
              sudo chown -R $USER:$USER "$DEPLOY_PATH"
            fi

            # Backup current version
            if [ -d "$DEPLOY_PATH/current" ]; then
              echo "💾 Backing up current version"
              sudo mv "$DEPLOY_PATH/current" "$DEPLOY_PATH/backup-$TIMESTAMP" || true
            fi

            # Deploy new version
            echo "📦 Deploying new version"
            sudo mkdir -p "$DEPLOY_PATH/current"
            sudo cp -r "$TEMP_DIR"/* "$DEPLOY_PATH/current/"
            sudo chown -R www-data:www-data "$DEPLOY_PATH/current"

            # Execute deployment script
            if [ -f "$DEPLOY_PATH/current/deploy-server.sh" ]; then
              echo "⚙️  Executing deployment script"
              cd "$DEPLOY_PATH/current"
              sudo bash deploy-server.sh
            fi

            # Cleanup temp directory
            echo "🧹 Cleaning up temporary files"
            rm -rf "$TEMP_DIR"

            # Keep only last 3 backups
            cd "$DEPLOY_PATH"
            ls -t | grep "^backup-" | tail -n +4 | xargs -r sudo rm -rf

            echo "✅ Deployment completed successfully"
            echo "🌐 Site URL: https://www.juriste-droit-du-travail.com"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "🔍 Verifying deployment"

            # Check if files exist
            if [ -d "${{ secrets.DEPLOY_PATH }}/current" ]; then
              echo "✅ Deployment directory exists"
              ls -lh "${{ secrets.DEPLOY_PATH }}/current" | head -10
            else
              echo "❌ Deployment directory not found"
              exit 1
            fi

            # Check Nginx status
            if sudo nginx -t 2>&1 | grep -q "successful"; then
              echo "✅ Nginx configuration is valid"
            else
              echo "⚠️  Nginx configuration has issues"
            fi

            # Test site response
            if curl -s -o /dev/null -w "%{http_code}" http://localhost | grep -q "200\|301\|302"; then
              echo "✅ Site is responding"
            else
              echo "⚠️  Site may not be responding correctly"
            fi

            echo "✅ Verification completed"
